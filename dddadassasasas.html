<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: o;
            font-family: sans-serif;
            background-color: rgb(148, 241, 162);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 80px auto 60px;
            gap: 10px;
            height: 100vh;
            padding: 10px
        }

        .box {
            background: bisque;
            padding: 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .header {
            grid-column: 1/3;
            background: rgb(253, 243, 131);
            text-align: center;
        }

        .sidebar {
            background: rgb(248, 210, 116);
            text-align: center;
        }

        .content {
            background: rgb(239, 255, 149);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .card {
            background: rgb(143, 251, 255);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }

        .footer {
            background: rgb(253, 203, 111);
            grid-column: 1/3;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box header">
            Indian Sweet Treats
        </div>
        <div class="box sidebar">
            Menu
            ...
            see in the in the restraunt
        </div>
        <div class="box content">
            <div class="card">
                <img src="Gulab-Jamun-1024x683.jpg" alt="" width="40px">
            </div>
            <div class="card">
                card2
            </div>
            <div class="card">
                card3
            </div>
            <div class="card">
                card4
            </div>
        </div>
        <div class="box footer">
            footer
        </div>
    </div>
</body>

</html>
